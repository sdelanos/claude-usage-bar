name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-progress runs for the same ref so PR pushes don't pile up.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test (macOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcode-select -p
          swift --version

      - name: Run tests
        run: swift test
